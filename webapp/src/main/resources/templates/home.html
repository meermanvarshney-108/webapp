<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>WebApp</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.1.3/css/bootstrap.min.css" />
</head>
<body>
<div class="container mt-5">
    <div class="row">
        <div class="col">
            <h1 class="text-center">Welcome to Web App with CI/CD!</h1>
            <div class="d-flex justify-content-center">
                <button class="btn btn-primary mt-4" id="clickButton">Click Me!</button>
            </div>
            <h2 class="mt-4 text-center" id="message" style="display: none;">Hello, World!</h2>

            <hr class="mt-5"/>
            <h5 class="text-muted text-center">Runtime Info</h5>
            <table class="table table-bordered mt-3 mx-auto w-auto">
                <tbody>
                <tr><th scope="row" class="px-4">Hostname</th><td class="px-4" th:text="${hostname}"></td></tr>
                <tr><th scope="row" class="px-4">IP Address</th><td class="px-4" th:text="${ip}"></td></tr>
                <tr><th scope="row" class="px-4">URL</th><td class="px-4" th:text="${url}"></td></tr>
                <tr><th scope="row" class="px-4">Java Version</th><td class="px-4" th:text="${javaVersion}"></td></tr>
                <tr><th scope="row" class="px-4">OS</th><td class="px-4" th:text="${os}"></td></tr>
                <tr><th scope="row" class="px-4">Date &amp; Time</th><td class="px-4" id="datetime"></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById("clickButton").onclick = function() {
        document.getElementById("message").style.display = "block";
    };

    document.getElementById("datetime").textContent = new Date().toLocaleString();
</script>
</body>
</html>
